<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>本地模型库</title>
  <link rel="icon" href="/files/imgs/fav.ico">
  <link rel="stylesheet" href="/static/css/gallery.css">
  <noscript>
    <link rel="stylesheet" href="/static/css/gallery.css">
  </noscript>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>本地模型库</h1>
      <div class="sub">搜索 / 标签 / 作者筛选，点击卡片打开本地详情页</div>
    </div>
    <a class="btn" href="/config">配置 / 归档</a>
  </header>
  <div class="search">
    <div class="search-row">
      <input type="text" id="kw" placeholder="搜索标题或标签..." />
      <button class="clear-btn" type="button" id="clearBtn">清</button>
    </div>
    <div class="filters">
      <span class="filters__label">分类</span>
      <div id="filterChips" class="filters__chips"></div>
    </div>
    <div class="filters">
      <span class="filters__label">作者</span>
      <div id="authorChips" class="filters__chips"></div>
    </div>
    <div class="filters">
      <span class="filters__label">筛选</span>
      <div class="filters__chips">
        <button class="filter-chip" type="button" id="favOnlyBtn" aria-pressed="false">只看收藏</button>
        <button class="filter-chip" type="button" id="printedOnlyBtn" aria-pressed="false">只看已打印</button>
      </div>
    </div>
  </div>
  <div id="grid" class="grid" role="list"></div>
  <div id="pagination" class="pagination" aria-label="分页"></div>

  <div id="filterModal" class="filter-modal" style="display:none;" aria-hidden="true">
    <div class="filter-modal__inner" role="dialog" aria-modal="true" aria-labelledby="filterModalTitle">
      <div class="filter-modal__header">
        <div id="filterModalTitle" class="filter-modal__title">全部分类</div>
        <button class="filter-modal__close" type="button" aria-label="关闭">×</button>
      </div>
      <div class="filter-modal__body">
        <div id="filterModalChips" class="filter-modal__chips"></div>
      </div>
    </div>
  </div>

  <!-- Lightbox / modal for image preview -->
  <div id="lightbox" class="lightbox" style="display:none;" aria-hidden="true">
    <div class="lightbox-inner" role="dialog" aria-modal="true">
      <button class="lightbox-close" aria-label="关闭">✖</button>
      <button class="lightbox-prev" aria-label="上一张">◀</button>
      <img id="lightbox-img" alt="预览图片">
      <div id="lightbox-caption" class="lightbox-caption"></div>
      <button class="lightbox-next" aria-label="下一张">▶</button>
    </div>
  </div>

  <div id="empty" class="muted" style="display:none;">暂无模型</div>
</div>
<script src="/static/js/gallery.js" defer></script>
</body>
</html>
